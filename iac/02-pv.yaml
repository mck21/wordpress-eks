apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-mariadb
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    # Format: <EFS_FILE_SYSTEM_ID>::<ACCESS_POINT_ID>
    # Find both in AWS Console → EFS → your file system → Access Points
    volumeHandle: fs-XXXXXXXX::fsap-AAAAAAAA
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-wordpress
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    # Format: <EFS_FILE_SYSTEM_ID>::<ACCESS_POINT_ID>
    volumeHandle: fs-XXXXXXXX::fsap-BBBBBBBB
